
<!DOCTYPE html>
<html lang="ko" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>SPIN Sales Diagnostics</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#020617">
    <meta name="format-detection" content="telephone=no">
    
    <!-- [CRITICAL] es-module-shims MUST come first -->
    <script async src="https://ga.jspm.io/npm:es-module-shims@1.10.0/dist/es-module-shims.js"></script>

    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "recharts": "https://esm.sh/recharts@2.15.0?external=react,react-dom",
    "lucide-react": "https://esm.sh/lucide-react@0.462.0?external=react,react-dom",
    "@google/genai": "https://esm.sh/@google/genai@1.3.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/"
  }
}
</script>

    <script>
      window.onerror = function(msg, url, line, col, error) {
        var errorDisplay = document.getElementById('mobile-error-log');
        if (errorDisplay) {
          errorDisplay.style.display = 'block';
          errorDisplay.innerHTML += '<div>[Error] ' + msg + ' (Line: ' + line + ')</div>';
        }
        return false;
      };

      window.tailwind = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            animation: {
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'float': 'float 6s ease-in-out infinite',
              'fade-in': 'fadeIn 0.5s ease-out forwards',
              'shimmer-fast': 'shimmer 1.5s infinite',
              'rotate-slow': 'rotate 10s linear infinite',
              'sparkle': 'sparkle 2s ease-in-out infinite',
              'shine': 'shine 3s infinite',
            },
            keyframes: {
              float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } },
              fadeIn: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
              shimmer: { '0%': { transform: 'translateX(-200%)' }, '100%': { transform: 'translateX(200%)' } },
              rotate: { '0%': { transform: 'rotate(0deg)' }, '100%': { transform: 'rotate(360deg)' } },
              sparkle: { '0%, 100%': { opacity: '0.3', transform: 'scale(1)' }, '50%': { opacity: '1', transform: 'scale(1.2)' } },
              shine: {
                '0%': { left: '-100%', top: '-100%' },
                '20%': { left: '100%', top: '100%' },
                '100%': { left: '100%', top: '100%' }
              }
            }
          }
        }
      }
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --app-height: 100%;
      }
      html, body {
        height: 100%;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
        -webkit-overflow-scrolling: touch;
      }
      body {
        font-family: 'Inter', sans-serif;
        background-color: #020617;
        color: #f8fafc;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior-y: none;
        /* FIXED: user-select none was blocking input focus on mobile */
        user-select: auto; 
      }
      #root { 
        min-height: 100vh; 
        min-height: -webkit-fill-available;
      }
      input, textarea { 
        font-size: 16px !important; 
        -webkit-appearance: none;
        border-radius: 0;
        user-select: text !important;
        -webkit-user-select: text !important;
      }
      
      #splash-screen {
        position: fixed;
        inset: 0;
        background: #020617;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.5s ease-out;
      }
      #mobile-error-log {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(0,0,0,0.9);
        color: #ff4444;
        font-family: monospace;
        font-size: 10px;
        padding: 10px;
        z-index: 10000;
        display: none;
        max-height: 100px;
        overflow-y: auto;
      }
      .loader-bar {
        width: 120px;
        height: 2px;
        background: rgba(34, 211, 238, 0.1);
        position: relative;
        overflow: hidden;
        margin-top: 20px;
      }
      .loader-bar::after {
        content: '';
        position: absolute;
        left: -100%;
        width: 100%;
        height: 100%;
        background: #22d3ee;
        animation: loading 1.5s infinite;
      }
      @keyframes loading {
        0% { left: -100%; }
        100% { left: 100%; }
      }
      
      .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: transparent;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.2);
      }

      /* Native-like Safe Area Padding */
      header { padding-top: env(safe-area-inset-top); }
    </style>
    <script>
      window.process = { env: { NODE_ENV: 'production', API_KEY: '' } };
      
      const setAppHeight = () => {
        document.documentElement.style.setProperty('--app-height', `${window.innerHeight}px`);
      };
      window.addEventListener('resize', setAppHeight);
      setAppHeight();

      setTimeout(function() {
        var splash = document.getElementById('splash-screen');
        if (splash && splash.style.opacity !== '0') {
           splash.style.opacity = '0';
           setTimeout(function() { if(splash.parentNode) splash.remove(); }, 500);
        }
      }, 5000);
    </script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="splash-screen">
      <div style="font-weight: 900; letter-spacing: -0.05em; color: white; font-size: 20px;">
        SALES <span style="color: #22d3ee;">DIAGNOSTICS</span>
      </div>
      <div class="loader-bar"></div>
    </div>
    <div id="mobile-error-log"></div>
    <div id="root"></div>
    
    <script type="module" src="/index.tsx"></script>
</body>
</html>
